<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="supabase-url" content="https://oqqoafejnzoolbpskbji.supabase.co" />
    <meta name="supabase-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcW9hZmVqbnpvb2xicHNrYmppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ0NzYsImV4cCI6MjA5MjM2MDQ3Nn0.28ilXh_YHdf7PBCrEz4r_gA20MmeOmo7ZViNIixMJgM" />
    <meta name="csrf-token" content="temporary-placeholder" />
    <title>IRONFIT - Nova Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Barlow", sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(20,20,20,0.86);
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo {
            font-family: "Bebas Neue", sans-serif;
            font-size: 36px;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo span { color: #e8ff00; }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            color: #aaa;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font: inherit;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #e8ff00;
            box-shadow: 0 0 0 3px rgba(232,255,0,0.1);
        }
        button {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            border: none;
            border-radius: 6px;
            background: #e8ff00;
            color: #000;
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 1px;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        .alert.show { display: block; }
        .alert.success {
            color: #44ff64;
            background: rgba(68,255,100,0.1);
            border: 1px solid #44ff64;
        }
        .alert.error {
            color: #ff4444;
            background: rgba(255,68,68,0.1);
            border: 1px solid #ff4444;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
        }
        .footer a {
            color: #e8ff00;
            cursor: pointer;
            text-decoration: none;
        }
        @media (max-width: 480px) {
            body { padding: 0; }
            .auth-card {
                min-height: 100vh;
                border: none;
                border-radius: 0;
                padding: 28px 16px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <div class="logo">IRON<span>FIT</span></div>
        <div class="subtitle">NOVA SENHA</div>
        <div id="alertBox" class="alert"></div>
        <p id="introText">Digite sua nova senha para concluir a recuperação da conta.</p>
        <form id="resetForm" hidden>
            <div class="form-group">
                <label for="password">Nova senha</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar senha</label>
                <input type="password" id="confirmPassword" placeholder="Repita a nova senha" autocomplete="new-password" required />
            </div>
            <button type="submit" id="saveBtn">Salvar nova senha</button>
        </form>
        <div class="footer">
            <a href="login.html">Voltar ao login</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://oqqoafejnzoolbpskbji.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcW9hZmVqbnpvb2xicHNrYmppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODQ0NzYsImV4cCI6MjA5MjM2MDQ3Nn0.28ilXh_YHdf7PBCrEz4r_gA20MmeOmo7ZViNIixMJgM';
        const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);
        const form = document.getElementById('resetForm');
        const btn = document.getElementById('saveBtn');
        const alertBox = document.getElementById('alertBox');
        const introText = document.getElementById('introText');
        let recoveryReady = false;

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert show ${type}`;
        }

        function showForm() {
            recoveryReady = true;
            form.hidden = false;
            introText.textContent = 'Digite sua nova senha para concluir a recuperação da conta.';
        }

        function showInvalidLink() {
            recoveryReady = false;
            form.hidden = true;
            introText.textContent = 'Este link não está pronto para troca de senha. Solicite um novo link de recuperação.';
            showAlert('Link inválido ou expirado.', 'error');
        }

        async function prepareRecoverySession() {
            if (!supabaseClient) {
                showAlert('Sistema de recuperação indisponível no momento.', 'error');
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const errorMessage = params.get('error_description') || hashParams.get('error_description');

            if (errorMessage) {
                showInvalidLink();
                return;
            }

            supabaseClient.auth.onAuthStateChange((event, session) => {
                if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session?.access_token) {
                    showForm();
                }
            });

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.access_token) {
                showForm();
                return;
            }

            const code = params.get('code');
            if (code) {
                const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
                if (!error) {
                    showForm();
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return;
                }
            }

            showInvalidLink();
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!recoveryReady) {
                showInvalidLink();
                return;
            }

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password.length < 8) {
                showAlert('A senha deve ter no mínimo 8 caracteres.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password });
                if (error) throw error;

                localStorage.removeItem('ironfit_userEmail');
                localStorage.removeItem('ironfit_userId');
                localStorage.removeItem('ironfit_loggedIn');
                await supabaseClient.auth.signOut();

                showAlert('Senha atualizada com sucesso. Redirecionando para o login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1600);
            } catch (err) {
                showAlert('Não foi possível atualizar a senha: ' + (err.message || 'tente novamente.'), 'error');
                btn.disabled = false;
                btn.textContent = 'Salvar nova senha';
            }
        });

        prepareRecoverySession();
    </script>
</body>
</html>
