    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Verificar se Supabase foi carregado
        let supabaseLib = null;

        function getAuthRedirectUrl(pageName) {
            return new URL(pageName, window.location.href).href;
        }

        function syncAuthUser(user) {
            if (!user) return;
            const fullName = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || '';
            localStorage.setItem('ironfit_userEmail', user.email || '');
            localStorage.setItem('ironfit_userId', user.id || '');
            localStorage.setItem('ironfit_loggedIn', 'true');
            if (fullName) localStorage.setItem('ironfit_fullName', fullName);
        }

        function showAuthRedirectError() {
            const params = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const message = params.get('error_description') || hashParams.get('error_description') || params.get('error') || hashParams.get('error');

            if (message) {
                showAlert(decodeURIComponent(message), 'error');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
        try {
            supabaseLib = window.supabase;
            console.log('✅ Supabase JS carregado:', supabaseLib ? 'OK' : 'FALHOU');
        } catch (e) {
            console.warn('⚠️ Erro ao carregar Supabase:', e);
        }
        async function handleGoogleLogin() {
    const btn = document.getElementById('googleLoginBtn');
 
    if (!supabaseClient) {
        showAlert('Login com Google indisponível no momento. Tente o login com email.', 'error');
        return;
    }
 
    if (btn) {
        btn.disabled = true;
        btn.querySelector('span').textContent = 'Conectando...';
    }
 
    try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                // Depois do login no Google, o Supabase redireciona para esta URL.
                // Ajuste se o domínio de produção for diferente.
                redirectTo: getAuthRedirectUrl('index.html')
            }
        });
 
        if (error) {
            console.error('Erro no login com Google:', error);
            showAlert('Erro ao conectar com Google: ' + error.message, 'error');
            if (btn) {
                btn.disabled = false;
                btn.querySelector('span').textContent = 'Continuar com Google';
            }
        }
        // Se não houver erro, o navegador é redirecionado para o Google,
        // então não há necessidade de tratar sucesso aqui — o retorno
        // acontece em outra navegação, já autenticado.
    } catch (err) {
        console.error('Erro inesperado no login com Google:', err);
        showAlert('Erro inesperado. Tente novamente.', 'error');
        if (btn) {
            btn.disabled = false;
            btn.querySelector('span').textContent = 'Continuar com Google';
        }
    }
}

        // Função melhorada de login
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('alertBox');

            // Limpar mensagens de erro anteriores
            clearErrors();

            // Validações
            if (!email) {
                showError('emailError', 'Email é obrigatório');
                return;
            }

            if (!isValidEmail(email)) {
                showError('emailError', 'Email inválido');
                return;
            }

            if (!password || password.length < 6) {
                showError('passwordError', 'Senha deve ter no mínimo 6 caracteres');
                return;
            }

            // Mostrar carregamento
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Entrando... ⏳';

            // Verificar Supabase - se não tiver configuração, usar modo desenvolvimento
            if (!supabaseClient || !supabaseLib) {
                console.log('🔧 Modo desenvolvimento: login simulado');
                
                // MODO DESENVOLVIMENTO - Permite login sem Supabase
                // Armazena email no localStorage para simular sessão
                localStorage.setItem('ironfit_userEmail', email);
                localStorage.setItem('ironfit_loggedIn', 'true');
                localStorage.setItem('ironfit_userId', 'dev-user-' + Date.now());
                
                showAlert('Modo desenvolvimento: login realizado com sucesso! 🎉', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar 🔓';
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    // Mensagens de erro mais específicas
                    if (error.message.includes('Invalid login credentials') || error.message.includes('invalid')) {
                        showAlert('Email ou senha incorretos', 'error');
                    } else if (error.message.includes('Email not confirmed')) {
                        showAlert('Confirme seu email antes de fazer login', 'warning');
                    } else if (error.message.includes('Failed to fetch') || error.message.includes('network')) {
                        // Erro de rede - oferece modo desenvolvimento
                        showAlert('Erro de conexão. Tentando modo desenvolvimento...', 'warning');
                        
                        localStorage.setItem('ironfit_userEmail', email);
                        localStorage.setItem('ironfit_loggedIn', 'true');
                        localStorage.setItem('ironfit_userId', 'dev-user-' + Date.now());
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        showAlert('Erro ao fazer login: ' + error.message, 'error');
                    }
                } else if (data && data.user) {
                    localStorage.setItem('ironfit_userEmail', data.user.email || email);
                    localStorage.setItem('ironfit_userId', data.user.id || 'user-' + Date.now());
                    localStorage.setItem('ironfit_loggedIn', 'true');
                    localStorage.setItem('userEmail', data.user.email || email);
                    localStorage.setItem('userId', data.user.id || 'user-' + Date.now());
                    if (data.user.user_metadata?.full_name) {
                        localStorage.setItem('ironfit_fullName', data.user.user_metadata.full_name);
                    }

                    showAlert('Login bem-sucedido! Redirecionando...', 'success');

                    const profileQuery = await supabaseClient
                        .from('user_profiles')
                        .select('role,account_status')
                        .eq('user_id', data.user.id)
                        .maybeSingle();

                    const profile = profileQuery.data;
                    const isAdmin = !profileQuery.error && profile?.role === 'admin' && profile?.account_status === 'active';
                    const isAcademyOwner = !profileQuery.error && profile?.role === 'academy_owner' && profile?.account_status === 'active';
                    if (isAdmin) {
                        localStorage.setItem('ironfit_userRole', 'admin');
                    } else if (isAcademyOwner) {
                        localStorage.setItem('ironfit_userRole', 'academy_owner');
                    } else {
                        localStorage.removeItem('ironfit_userRole');
                    }
                    setTimeout(() => {
                        window.location.href = isAdmin ? 'admin/' : isAcademyOwner ? 'academy/' : 'index.html';
                    }, 1500);
                }
            } catch (err) {
                // Se der qualquer erro, tenta modo desenvolvimento
                console.warn('Erro no login, redirecionando para modo desenvolvimento:', err);
                
                localStorage.setItem('ironfit_userEmail', email);
                localStorage.setItem('ironfit_loggedIn', 'true');
                localStorage.setItem('ironfit_userId', 'dev-user-' + Date.now());
                
                showAlert('Login realizado com sucesso! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } finally {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar 🔓';
            }
        }

        // Funções auxiliares
        function isValidEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');

                // Adicionar classe ao input
                const inputId = elementId.replace('Error', '');
                const input = document.getElementById(inputId);
                if (input) input.classList.add('error');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('input').forEach(el => {
                el.classList.remove('error');
            });
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert show ${type}`;
            
            // Auto-hide após 5 segundos (exceto para sucesso)
            if (type !== 'success') {
                setTimeout(() => {
                    alertBox.classList.remove('show');
                }, 5000);
            }
        }

        function goToRegister() {
            window.location.href = 'register.html';
        }

        function goToForgot() {
            window.location.href = 'forgot-password.html';
        }

        function togglePassword(inputId, btnEl) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            if (btnEl) btnEl.textContent = isHidden ? '🔓' : '🔒';
        }

        // Garantir estado inicial do botão (opcional)
        const __pwInput = document.getElementById('password');
        const __pwBtn = document.querySelector("button[onclick=\"togglePassword('password', this)\"]");
        if (__pwInput && __pwBtn) __pwBtn.textContent = '🔓';

        // Verificar se já está logado

        async function checkIfLoggedIn() {
            const loggedInLocal = localStorage.getItem('ironfit_loggedIn') === 'true';
            const userEmailLocal = localStorage.getItem('ironfit_userEmail');
            const localRole = localStorage.getItem('ironfit_userRole');

            if (loggedInLocal && userEmailLocal && localRole) {
                window.location.href = localRole === 'admin' ? 'admin/' : localRole === 'academy_owner' ? 'academy/' : 'index.html';
                return;
            }

            if (!supabaseClient) return;

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session?.access_token) return;

                const { data, error } = await supabaseClient.auth.getUser();
                if (!error && data?.user) {
                    syncAuthUser(data.user);

                    const { data: profile, error: profileError } = await supabaseClient
                        .from('user_profiles')
                        .select('role,account_status')
                        .eq('user_id', data.user.id)
                        .maybeSingle();

                    const isAdmin = !profileError && profile?.role === 'admin' && profile?.account_status === 'active';
                    const isAcademyOwner = !profileError && profile?.role === 'academy_owner' && profile?.account_status === 'active';
                    if (isAdmin) {
                        localStorage.setItem('ironfit_userRole', 'admin');
                        window.location.href = 'admin/';
                    } else if (isAcademyOwner) {
                        localStorage.setItem('ironfit_userRole', 'academy_owner');
                        window.location.href = 'academy/';
                    } else {
                        localStorage.removeItem('ironfit_userRole');
                        window.location.href = 'index.html';
                    }
                }
            } catch (err) {
                console.log('Usuário não logado');
            }
        }

        showAuthRedirectError();
        checkIfLoggedIn();
    </script>
</body>
</html>
